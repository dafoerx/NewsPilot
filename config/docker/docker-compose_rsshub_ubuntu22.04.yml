services:
  rsshub:
    image: diygod/rsshub:latest
    container_name: rsshub
    restart: always
    ports:
      - "1200:1200"
    environment:
      - NODE_ENV=production
      - CACHE_TYPE=redis
      - REDIS_URL=redis://redis:6379/0
      # 代理设置：指向宿主机的 7890 端口
      - PROXY_PROTOCOL=http
      - PROXY_HOST=host.docker.internal
      - PROXY_PORT=7890
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:alpine
    container_name: rsshub-redis
    restart: always
    volumes:
      - redis-data:/data

volumes:
  redis-data:
